{% load static %}

<aside class="variant-compare-panel">

    <div class="panel-heading">
        <p class="eyebrow">Same car comparison</p>
        <h3>Compare variants</h3>
        <p>Select up to three variants of the {{ car.name }}.</p>
    </div>

    <div class="compare-toolbar">
        <label class="compare-toggle">
            <input
                type="checkbox"
                id="differenceToggle">
            Show differences only
        </label>
    </div>

    <div class="compare-table-wrapper">
        <div id="variantComparisonContent">
            <div class="empty-state" id="compareEmptyState">
                <p>Select variants from the list to compare them here.</p>
            </div>
        </div>
    </div>

</aside>
