{% load static %}

<section class="section-strip muted" id="compare">

    <div class="section-heading">
        <p class="eyebrow">Comparison engine</p>
        <h2>Pick up to three cars.</h2>
        <p>Compare price, power, torque, mileage, clearance, and safety in a single clean view.</p>
    </div>

    <div class="comparison-layout">
        <div class="compare-picker" id="comparePicker"></div>
        
        <div class="compare-output">
            <div class="compare-toolbar">
                <label class="compare-toggle">
                    <input
                        type="checkbox"
                        id="differenceToggle">
                    Show differences only
                </label>
            </div>
        
            <div id="compareOutput">
                <div class="empty-state">
                    <h3>No cars selected yet.</h3>
                    <p>Use the compare buttons on car cards, or choose from the list here.</p>
                </div>
            </div>
    
        </div>
    </div>
</section>
