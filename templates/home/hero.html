<section class="hero">
    <div class="hero-copy">
        <p class="eyebrow">
            Indian car intelligence
        </p>
        <h1>
            Find every car sold in India.
        </h1>
        <p class="hero-lede">
            Explore specs, variants,
            prices, safety ratings,
            performance, and clean
            side-by-side comparisons
            without the clutter.
        </p>
        <form class="hero-search" id="heroSearch" role="search">
            <label class="sr-only" for="globalSearch">
                Search cars
            </label>
            <input id="globalSearch" type="search" placeholder="Search XUV700, Creta, EV, 5-star safety..."
                autocomplete="off" >
            <button class="primary-button" type="submit">
                Search
            </button>
        </form>
        <div class="quick-picks">
            <button type="button" data-chip="SUV">
                SUV
            </button>
            <button type="button" data-chip="Under INR 20L">
                Under INR 20L
            </button>
            <button type="button" data-chip="5 ★ Safety">
                5 ★ Safety
            </button>
            <button type="button" data-chip="Automatic">
                Automatic
            </button>
        </div>
    </div>
    <div class="hero-visual">
        <img src="static\images\car-images\heroImages\heroImage.png" alt="Premium sports car on a road">
    </div>
</section>
